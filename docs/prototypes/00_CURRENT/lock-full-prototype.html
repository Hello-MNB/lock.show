<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>LOCK · Bookability Passport</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   LOCK — Interactive clickable prototype. ONE app window, one screen at a time.
   Tokens mirror the six finished mockups (dark app + paper public passport).
   Firewall: bands + binaries + method labels only. No score / rank / gauge.
   ═══════════════════════════════════════════════════════════════════════════ */
:root{
  /* ═══ TIER 1 — BRAND (raw DS palette · the only literal colours) ═══ */
  --brand-ink:#090D0A;        /* DS core · near-black */
  --brand-forest:#17221A;     /* DS core · forest */
  --brand-forest-2:#1C2A20;   /* proposed — Codex DS · forest highlight */
  --brand-lime:#C8F04D;       /* DS core · THE single accent */
  --brand-lime-deep:#AEDA36;  /* lime, pressed/gradient foot */
  --brand-paper:#F3F5EF;      /* DS core · paper */
  --brand-mist:#DDE3D9;       /* DS core · mist */
  --brand-slate:#687269;      /* DS core · slate */
  --brand-teal:#46DCC2;       /* proposed — Codex DS · "developing" only, NOT orange */
  /* REMOVED (U9/§7.0): --gold #F2C063, --amber-stage #D7A84A. Do NOT reintroduce.
     Provenance now reads as lime(confirmed) vs neutral(pending). See §7 replace-list. */

  /* ═══ TIER 2 — SEMANTIC (dark app roles; every component reads these) ═══ */
  /* Surface elevation ramp — each step ~+6–8% luminance, own hairline */
  /* A13 LIGHT RE-GROUND — paper/ink app; dark survives only in .dark-island scopes */
  --canvas:#F3F5EF;                       /* app background · paper */
  --surface-1:#FFFFFF;                    /* rail / chrome · white */
  --surface-2:#FFFFFF;                    /* cards, sheets · white */
  --surface-3:#F3F5EF;                    /* insets, fields, rows · paper inset */
  --surface-4:#E9ECE4;                    /* hover / active raise · paper hover */
  --hairline:rgba(10,13,11,.06);          /* level divider · ink α */
  --border:#D4DBD2;                        /* default container border · DS hairline */
  --border-strong:rgba(10,13,11,.16);     /* focused / raised border · ink α */
  --edge-top:inset 0 1px 0 rgba(255,255,255,.6); /* top-highlight · paper top-light */

  --text:#0A0D0B;         /* primary · ink */
  --text-muted:#687269;   /* secondary · slate */
  --text-faint:#949B92;   /* tertiary / captions · slate-tint (A13: never critical) */

  --accent:var(--brand-lime);
  --accent-deep:var(--brand-lime-deep);
  --on-accent:#12160A;    /* text on a lime fill */

  /* State vocabulary — the ONLY status colours (firewall: bands/binaries) */
  --state-ready:var(--brand-lime);   /* confirmed / Ready */
  --state-dev:var(--brand-teal);     /* Developing */
  --state-attention:var(--brand-mist);/* "Needs you" — NEUTRAL warm-white, NOT amber */
  --state-locked:var(--text-faint);  /* Locked */

  /* Provenance — replaces the gold method chip */
  --prov-confirmed:var(--brand-lime);
  --prov-confirmed-bg:rgba(200,240,77,.10);
  --prov-confirmed-line:rgba(200,240,77,.30);
  --prov-pending:var(--brand-mist);
  --prov-pending-bg:rgba(221,227,217,.06);
  --prov-pending-line:rgba(221,227,217,.16);

  --focus:0 0 0 3px rgba(200,240,77,.30);      /* single focus ring token */
  --ease-orbit:cubic-bezier(.2,.8,.25,1);      /* orbit-widget motion */
  --shadow-1:0 1px 2px rgba(10,13,11,.04);
  --shadow-2:0 8px 24px -12px rgba(10,13,11,.16);
  --shadow-card:0 18px 40px -24px rgba(10,13,11,.18);
  --glow-accent:0 10px 26px -10px rgba(200,240,77,.5);

  /* scales */
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s6:24px;--s8:32px;--s12:48px;
  --r1:8px;--r2:12px;--r3:16px;--r4:20px;
  --t-xs:11px;--t-sm:13px;--t-md:16px;--t-lg:18px;--t-xl:24px;--t-2xl:30px;--t-3xl:40px;
  --serif:"Frank Ruhl Libre",Georgia,"Times New Roman",serif;
  --sans:"Heebo",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;

  /* ═══ TIER 3 — COMPONENT (aliases only; no new colour) ═══ */
  --field-bg:var(--surface-3);
  --field-bg-focus:var(--surface-4);
  --field-text:var(--text);
  --field-placeholder:var(--text-faint);
  --field-border:var(--border-strong);
  --field-border-focus:var(--accent);
  --field-radius:11px;

  --chrome-bg:var(--surface-1);
  --rail-bg:#FAFBF8;                   /* faint paper tint · distinguishes rail from white cards */
  --card-bg:var(--surface-2);
  --card-border:var(--border);

  /* DS brand-structure + source accent (non-gold, retained) */
  --ink:var(--brand-ink);--forest:var(--brand-forest);--forest-2:var(--brand-forest-2);
  --lime:var(--brand-lime);--paper:var(--brand-paper);--mist:var(--brand-mist);--slate:var(--brand-slate);
  --near-black:var(--canvas);--panel:var(--surface-1);
  --source-blue:#6EA6A3;--blue-soft:rgba(110,166,163,.12);--ember:#9A5A2E;

  /* legacy names kept so existing rules resolve during migration */
  --bg:var(--canvas);--bg2:var(--surface-1);--surface:var(--surface-2);
  --surface2:var(--surface-3);--raise:var(--surface-4);
  --muted:var(--text-muted);--faint:var(--text-faint);--teal:var(--brand-teal);
  --line:var(--hairline);--line2:var(--border);--good:var(--brand-lime);
  --need:var(--state-attention);--na:var(--text-faint);
  --divider:var(--hairline);--card-shadow:var(--shadow-card);--glow:var(--glow-accent);
}
/* ── DARK ISLAND · re-establish the dark ramp locally so the global light flip can't leak in.
   Applied to the radar universe stage and the Passport hero media band ONLY. ── */
.dark-island{
  --canvas:#0A0F0C; --surface-1:#0E1512; --surface-2:#161D18; --surface-3:#1F2822; --surface-4:#28322B;
  --hairline:rgba(255,255,255,.06); --border:rgba(255,255,255,.10); --border-strong:rgba(255,255,255,.17);
  --edge-top:inset 0 1px 0 rgba(255,255,255,.045);
  --text:#F3F5EF; --text-muted:#AEB6AE; --text-faint:#7C847D;
  /* keep legacy aliases resolving dark inside the island */
  --bg:var(--canvas); --bg2:var(--surface-1); --surface:var(--surface-2); --surface2:var(--surface-3);
  --raise:var(--surface-4); --muted:var(--text-muted); --faint:var(--text-faint);
  --line:var(--hairline); --line2:var(--border); --near-black:var(--canvas); --panel:var(--surface-1);
  --rail-bg:var(--surface-1); --chrome-bg:var(--surface-1); --card-bg:var(--surface-2); --card-border:var(--border);
  --field-bg:var(--surface-3); --field-bg-focus:var(--surface-4); --divider:var(--hairline);
}
/* mobile type scale (DS body ≥16px; display steps down) */
@media(max-width:640px){ :root{ --t-3xl:32px; --t-2xl:24px; --t-xl:20px; } }
*{box-sizing:border-box}
html,body{margin:0;height:100%;width:100%;overflow:hidden}
body{
  font-family:var(--sans);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5;
  background:var(--canvas);
  position:fixed;inset:0;width:100vw;height:100vh;
  display:flex;flex-direction:column;
}
h1,h2,h3{font-family:var(--serif);font-weight:700;letter-spacing:-.01em;margin:0}
.mono{font-family:var(--mono)}
::selection{background:rgba(190,226,78,.28)}
button{font-family:inherit;cursor:pointer}

/* ── The single app window — fills the whole viewport (real full-screen app) ── */
.window{
  width:100vw;height:100vh;
  background:var(--bg);overflow:hidden;
  display:flex;flex-direction:column;position:relative}

/* ═══ TOP BAR — brand lockup (left) · breadcrumb (center) · unified hub (right) ═══ */
.chrome{display:flex;align-items:center;gap:var(--s3);padding:10px var(--s4);height:56px;background:linear-gradient(180deg,var(--chrome-bg),var(--panel));border-bottom:1px solid var(--line);box-shadow:var(--shadow-1);flex-shrink:0;position:relative;z-index:40}
.chrome-left,.chrome-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.chrome-right{margin-left:auto}/* keeps the hub pinned right even when the center crumb is hidden (mobile) */
/* brand lockup — emblem + wordmark ONLY (no divider, no switcher) */
.brandwrap{display:flex;align-items:center;gap:9px;padding-right:2px}
.brandmark{width:26px;height:26px;border-radius:7px;flex-shrink:0;background:linear-gradient(160deg,var(--forest-2),var(--forest));border:1px solid rgba(200,240,77,.22);display:grid;place-items:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 0 12px -6px rgba(200,240,77,.4)}
.brandmark svg{width:15px;height:15px;color:var(--lime)}
.wordmark{font-family:var(--mono);font-weight:700;letter-spacing:.24em;font-size:15px;line-height:1;color:var(--text);padding-right:.24em}
.wordmark .dot{color:var(--accent);margin-left:.02em}

@keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
/* menu label + workspace rows — reused inside the unified hub (.acct-menu) */
.menu-lab{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:6px 9px 6px;display:flex;align-items:center;gap:7px}
.menu-lab svg{width:12px;height:12px;opacity:.7}
.ws-item{display:flex;align-items:center;gap:11px;padding:9px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;width:100%;text-align:left;border:0;background:transparent}
.ws-item:hover{background:var(--surface2);color:var(--text)}
.ws-item.on{background:var(--surface2);color:var(--text)}
.ws-item .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--bg2);border:1px solid var(--line);color:var(--accent);flex-shrink:0;background-size:cover;background-position:center}
.ws-item .ic svg{width:16px;height:16px}
.ws-item small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-top:1px}
.ws-item .on-dot{margin-left:auto;color:var(--accent);font-size:13px;flex-shrink:0}

/* ── UNIFIED HUB (right · account identity + workspace switch + account actions) ── */
.acct{position:relative}
.acct-btn{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--line);border-radius:var(--r2);padding:4px 11px 4px 4px;color:var(--text)}
.acct-btn:hover{border-color:var(--line2);background:var(--surface)}
.acct-btn .av{width:28px;height:28px;border-radius:8px;flex-shrink:0;background:var(--forest-2);background-size:cover;background-position:center;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.02em;color:var(--mist);overflow:hidden}
.acct-btn .nm{font-size:12.5px;font-weight:700;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.acct-btn .cv{color:var(--faint);font-size:11px}
.acct-menu{position:absolute;top:114%;right:0;width:280px;background:var(--surface);border:1px solid var(--line2);border-radius:var(--r3);padding:8px;box-shadow:var(--shadow-2),var(--shadow-1);z-index:50;display:none;max-height:min(80vh,560px);overflow:auto}
.acct-menu.open{display:block;animation:pop .16s ease}
.acct-head{display:flex;align-items:center;gap:10px;padding:8px 9px 11px}
.acct-head .av{width:36px;height:36px;border-radius:9px;flex-shrink:0;background:var(--forest-2);background-size:cover;background-position:center;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:13px;color:var(--mist);overflow:hidden}
.acct-head b{display:block;font-size:13px;color:var(--text)}
.acct-head small{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.acct-head .ws-cur{color:var(--muted);letter-spacing:.14em;margin-top:2px}
.menu-div{height:1px;background:var(--divider);border:0;margin:6px 4px}
.acct-item{display:flex;align-items:center;gap:11px;padding:9px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;width:100%;text-align:left;border:0;background:transparent}
.acct-item:hover{background:var(--surface2);color:var(--text)}
.acct-item svg{width:16px;height:16px;opacity:.8;flex-shrink:0}
.acct-item.danger:hover{color:var(--need)}
.acct-menu .ws-item:focus-visible,.acct-item:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

/* ── LEFT RAIL — primary navigation ── */
.body{flex:1;display:flex;min-height:0}
.rail{width:216px;flex-shrink:0;background:var(--rail-bg);border-right:1px solid var(--line);padding:var(--s4) var(--s3);display:flex;flex-direction:column;gap:var(--s1);overflow:auto}
.rail .rlab{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:6px 10px 7px;margin-top:var(--s3);display:flex;align-items:center;gap:7px}
.rail .rlab::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--faint);flex-shrink:0}
.navitem{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r2);font-size:14px;font-weight:600;color:var(--muted);position:relative;border:1px solid transparent;transition:.14s;width:100%;text-align:left;background:transparent}
.navitem svg{width:18px;height:18px;opacity:.85;flex-shrink:0}
.navitem:hover{background:var(--surface);color:var(--text)}
.navitem.active{background:var(--surface);color:var(--text);box-shadow:inset 0 0 0 1px var(--line)}
.navitem.active svg{opacity:1;color:var(--accent)}
.navitem.active::before{content:"";position:absolute;left:-12px;top:11px;bottom:11px;width:3px;border-radius:2px;background:var(--accent)}
.navitem .badge-n{margin-left:auto;background:var(--accent);color:var(--on-accent);font-size:10px;font-weight:800;border-radius:999px;padding:1px 7px;font-family:var(--mono)}

/* ── MOBILE BOTTOM-NAV (shown ≤640px only) ── */
.botnav{display:none;position:absolute;left:0;right:0;bottom:0;z-index:35;background:var(--bg2);border-top:1px solid var(--line2);
  padding:6px 6px calc(6px + env(safe-area-inset-bottom,0));grid-auto-flow:column;grid-auto-columns:1fr;gap:2px}
.botnav .bn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:7px 2px;border-radius:12px;
  color:var(--faint);font-size:9.5px;font-weight:700;position:relative;border:0;background:transparent;letter-spacing:.02em}
.botnav .bn svg{width:21px;height:21px}
.botnav .bn.active{color:var(--accent)}
.botnav .bn.active svg{color:var(--accent)}
.botnav .bn .badge-n{position:absolute;top:2px;right:calc(50% - 20px);background:var(--accent);color:var(--on-accent);font-size:8.5px;font-weight:800;border-radius:999px;padding:0 5px;font-family:var(--mono);line-height:1.5}

.screen{flex:1;overflow:auto;padding:26px 30px;min-width:0;position:relative}
.screen.paper{background:#F3F5EF;padding:0}
.screen-anim{animation:slidein .28s cubic-bezier(.2,.7,.3,1)}
@keyframes slidein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── reusable ── */
.eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.h-display{font-family:var(--serif);font-weight:700;letter-spacing:-.01em}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r4);padding:var(--s6);box-shadow:var(--card-shadow)}
/* ── Light button hierarchy · one lime primary per view · 44px tap target ── */
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;padding:12px 20px;min-height:44px;
  font-weight:800;font-size:13.5px;color:var(--on-accent);background:linear-gradient(180deg,var(--accent),var(--accent-deep));box-shadow:var(--glow)}
.btn-primary:hover{filter:brightness(1.05)}
.btn-primary.sm{padding:9px 16px;min-height:40px;font-size:12.5px}
.btn-primary:disabled{opacity:.5;filter:grayscale(.3);cursor:not-allowed}
.btn-secondary{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;padding:11px 18px;min-height:44px;
  font-weight:700;font-size:13px;color:var(--text);background:var(--surface-1);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border-strong);background:var(--surface-4)}
.btn-secondary.sm{padding:9px 15px;min-height:40px;font-size:12.5px}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;padding:11px 16px;min-height:44px;
  font-weight:700;font-size:13px;color:var(--text);background:transparent;border:1px solid transparent}
.btn-ghost:hover{background:var(--surface-4);border-color:var(--hairline)}
.btn-ghost.sm{padding:8px 13px;min-height:40px;font-size:12px}
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:600;line-height:1.4}
.chip.lime{background:rgba(190,226,78,.1);color:var(--good)}
.chip.gold{background:var(--prov-pending-bg);color:var(--state-attention)}
.chip.na{background:rgba(10,13,11,.05);color:var(--na)}
.chip.blue{background:rgba(110,166,163,.12);color:var(--source-blue)}
.chip.teal{background:rgba(70,220,194,.1);color:var(--teal)}
.chip.amber{background:var(--prov-pending-bg);color:var(--state-attention)}
.method{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--prov-pending);background:var(--prov-pending-bg);border:1px solid var(--prov-pending-line);border-radius:6px;padding:2px 7px;display:inline-flex;align-items:center;gap:5px}
.method.confirmed{color:var(--text);background:var(--prov-confirmed-bg);border-color:var(--prov-confirmed-line)}
.method.evidence{color:#BFE06B;background:transparent;border-color:rgba(200,240,77,.30)}
.method.source{color:var(--text-muted);background:transparent;border-color:var(--border)}
.method.declared{color:var(--text-faint);background:transparent;border-color:var(--divider)}
.field{width:100%;background:var(--field-bg);border:1px solid var(--field-border);
  color:var(--field-text);-webkit-text-fill-color:var(--field-text);
  border-radius:var(--field-radius);padding:12px 14px;font-size:15px;font-family:var(--sans);
  outline:none;box-shadow:var(--edge-top)}
.field::placeholder{color:var(--field-placeholder);opacity:1}
.field:focus{background:var(--field-bg-focus);border-color:var(--field-border-focus);box-shadow:var(--focus)}
.field:-webkit-autofill{-webkit-text-fill-color:var(--field-text);
  -webkit-box-shadow:0 0 0 40px var(--field-bg) inset;caret-color:var(--field-text)}
.label{display:block;font-size:12.5px;font-weight:700;color:var(--text-muted);margin-bottom:7px}
.hr{height:1px;background:var(--line);border:0;margin:14px 0}
.hint{font-size:11.5px;color:var(--faint);line-height:1.55}
.pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.pagehead h1{font-size:var(--t-2xl)}
.subtle{font-size:12px;color:var(--muted);margin:2px 0 16px}

/* hint pulse on the primary next action */
.hint-pulse{position:relative}
.hint-pulse::after{content:"";position:absolute;inset:-4px;border-radius:16px;border:2px solid var(--accent);opacity:0;animation:ring 2s ease-out infinite;pointer-events:none}
@keyframes ring{0%{opacity:.7;transform:scale(.96)}70%{opacity:0;transform:scale(1.06)}100%{opacity:0}}

/* ═══ RADAR ═══ */
/* one-viewport radar: #screen becomes a flex column that clips overflow, and the
   universe flexes to the leftover height so the page never scrolls. */
.screen.radar-mode{overflow:hidden;display:flex;flex-direction:column;padding:14px 30px 18px}
.screen.radar-mode .screen-anim{flex:1 1 auto;min-height:0;display:flex;flex-direction:column}
.radar-screen{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;gap:10px}
.radar-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.radar-hero h1{font-size:var(--t-xl)}
.radar-hero .rsub{font-size:13px;color:var(--muted);line-height:1.45;margin:3px 0 0;max-width:64ch}
.lensrail{display:inline-flex;gap:4px;background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:3px;align-self:flex-start}
.lensrail .rf{border-radius:999px;padding:6px 14px;border:1px solid transparent;background:transparent}
.lensrail .rf.active{background:rgba(255,255,255,.08);border-color:var(--line2);color:var(--text)}
.scene-chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line2);background:var(--surface2);color:var(--text);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;position:relative}
.scene-chip:hover{border-color:var(--faint)}
.scene-chip .sdot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px rgba(200,240,77,.6);flex-shrink:0}
.scene-chip .cv{color:var(--faint);font-size:11px}
.scene-menu{position:absolute;top:112%;right:0;width:230px;background:var(--surface);border:1px solid var(--line2);border-radius:14px;padding:8px;box-shadow:var(--shadow-2),var(--shadow-1);z-index:30}
.scene-menu .lab{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:6px 9px}
.scene-menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:0;background:transparent;color:var(--muted);font-size:13px;font-weight:600;padding:8px 9px;border-radius:9px}
.scene-menu button:hover{background:var(--surface2);color:var(--text)}
.scene-menu button.on{color:var(--text)}
.scene-menu button .rd{width:9px;height:9px;border-radius:50%;border:1px solid var(--line2);flex-shrink:0}
.scene-menu button.on .rd{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px rgba(200,240,77,.5)}
.scene-menu .note{font-size:11px;color:var(--faint);line-height:1.5;padding:7px 9px 4px;border-top:1px solid var(--divider);margin-top:5px}
.radar-stage{position:relative;flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden;
  background:
    radial-gradient(78% 46% at 50% -8%, rgba(200,240,77,.07), transparent 62%),
    radial-gradient(130% 85% at 50% 118%, rgba(0,0,0,.55), transparent 70%),
    linear-gradient(180deg, var(--forest-2), var(--bg2));
  border:1px solid var(--line);border-radius:24px;padding:16px 20px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05), var(--card-shadow)}
.radar-topline{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.radar-filters{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.rf-lab{font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-right:2px}
.rf{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 13px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border:1px solid transparent;background:var(--surface2);color:var(--muted);cursor:pointer;transition:.16s}
.rf:hover{color:var(--text);border-color:var(--line)}
.rf.active{background:rgba(255,255,255,.08);border-color:var(--line2);color:var(--text)}
.rf .gdot{width:6px;height:6px;border-radius:50%;background:var(--state-attention)}
.uni{position:relative;flex:1 1 auto;min-height:0;height:100%;width:auto;max-width:100%;aspect-ratio:1/1;margin:0 auto;transition:transform .3s cubic-bezier(.2,.7,.3,1)}
.orbit{position:absolute;border:1px solid var(--line);border-radius:50%}
.o1{inset:4%}.o2{inset:23%}.o3{inset:41%}
/* living radar sweep — a slow rotating wedge (thematic, not a gauge) */
.sweep{position:absolute;inset:4%;border-radius:50%;pointer-events:none;z-index:0;
  background:conic-gradient(from 0deg,rgba(200,240,77,.13),rgba(200,240,77,.04) 22%,transparent 44%);
  animation:sweep 9s linear infinite;mask:radial-gradient(circle,transparent 30%,#000 31%)}
@keyframes sweep{to{transform:rotate(360deg)}}
.planet{position:absolute;transform:translate(-50%,-50%);text-align:center;width:112px;z-index:2;cursor:pointer;transition:opacity .3s,filter .3s}
.planet.dim{opacity:.22;filter:grayscale(.55)}
.pnode{position:relative;margin:0 auto;display:grid;place-items:center;width:54px;height:54px;border-radius:50%;background:var(--surface2);border:1px solid var(--line2);transition:transform .2s,box-shadow .2s,border-color .2s;animation:pfloat 6s ease-in-out infinite}
.planet:nth-child(2n) .pnode{animation-duration:7.2s;animation-delay:-1.5s}
.planet:nth-child(3n) .pnode{animation-duration:8s;animation-delay:-3s}
@keyframes pfloat{0%,100%{transform:translateY(-2.5px)}50%{transform:translateY(2.5px)}}
.pnode svg{width:25px;height:25px;color:rgba(243,240,232,.9)}
.pnode.lit{border-color:rgba(200,240,77,.5);box-shadow:0 0 18px -4px rgba(200,240,77,.38)}
.pnode.dev{border-color:rgba(70,220,194,.5);box-shadow:0 0 14px -6px rgba(70,220,194,.4)}
.pnode.needs{border-color:rgba(221,227,217,.45);box-shadow:0 0 14px -4px rgba(221,227,217,.22)}
.planet:hover .pnode{animation-play-state:paused;transform:scale(1.1) translateY(0);box-shadow:0 0 26px rgba(200,240,77,.30),inset 0 0 0 1px rgba(200,240,77,.4)}
.planet.match .pnode{box-shadow:0 0 22px rgba(200,240,77,.24),inset 0 0 0 1px rgba(200,240,77,.35)}
.pnode .founddot{position:absolute;top:-2px;right:-2px;width:11px;height:11px;border-radius:50%;background:var(--mist);box-shadow:0 0 0 2px var(--bg2);animation:fdpulse 2s ease-in-out infinite}
@keyframes fdpulse{0%,100%{box-shadow:0 0 0 2px var(--bg2),0 0 0 0 rgba(221,227,217,.5)}50%{box-shadow:0 0 0 2px var(--bg2),0 0 0 5px rgba(221,227,217,0)}}
.pnode .done{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;border-radius:50%;display:grid;place-items:center;font-size:9px;background:rgba(190,226,78,.14);color:var(--good);box-shadow:0 0 0 1px var(--bg2)}
.pnode .gring{position:absolute;inset:-7px;border-radius:50%;border:1px solid rgba(221,227,217,.35)}
.planet.genre .pnode{box-shadow:0 0 26px -6px rgba(200,240,77,.18)}
.pnode.justlit{animation:litpop .7s ease}
@keyframes litpop{0%{transform:scale(.6);box-shadow:0 0 0 rgba(200,240,77,0)}55%{transform:scale(1.18);box-shadow:0 0 34px rgba(200,240,77,.55)}100%{transform:scale(1)}}
.plabel{margin-top:8px;font-family:var(--sans);font-size:13.5px;font-weight:700;letter-spacing:.01em;color:#CFD6CC;line-height:1.2}
.pgenre{margin-top:2px;font-family:var(--mono);font-size:7.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-faint)}
/* hover preview chip */
.ptip{position:absolute;left:50%;bottom:calc(100% + 6px);transform:translateX(-50%) translateY(4px);z-index:6;
  white-space:nowrap;pointer-events:none;opacity:0;transition:.18s;
  background:var(--surface);border:1px solid var(--line2);border-radius:9px;padding:6px 9px;box-shadow:var(--card-shadow)}
.ptip b{display:block;font-family:var(--sans);font-size:11px;font-weight:700;color:var(--text)}
.ptip span{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
.planet:hover .ptip{opacity:1;transform:translateX(-50%) translateY(0)}
@media(hover:none){.ptip{display:none}}
/* planet drill-in sheet */
.psheet-ov{position:absolute;inset:0;z-index:64;background:rgba(6,7,6,.62);backdrop-filter:blur(3px);animation:fade .18s ease}
.psheet{position:absolute;top:0;right:0;bottom:0;width:min(420px,92vw);background:linear-gradient(180deg,var(--surface),var(--bg2));border-left:1px solid var(--line2);box-shadow:var(--card-shadow);
  display:flex;flex-direction:column;animation:slidein-r .26s cubic-bezier(.2,.7,.3,1);overflow:auto}
@keyframes slidein-r{from{transform:translateX(24px);opacity:.4}to{transform:none;opacity:1}}
.psheet-head{position:sticky;top:0;background:linear-gradient(180deg,var(--surface),rgba(20,24,26,.9));border-bottom:1px solid var(--line);padding:16px 18px;display:flex;align-items:flex-start;gap:12px;z-index:2}
.psheet-head .pi{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:var(--bg2);border:1px solid var(--line2);color:var(--accent);flex-shrink:0}
.psheet-head .pi svg{width:22px;height:22px}
.psheet-head h3{font-size:17px;color:var(--text)}
.psheet-head .x{margin-left:auto;background:var(--surface2);border:1px solid var(--line2);border-radius:9px;color:var(--muted);width:30px;height:30px;flex-shrink:0;font-size:15px}
.psheet-head .x:hover{color:var(--text)}
.psheet-body{padding:16px 18px 22px}
.pnode-row{display:flex;align-items:flex-start;gap:11px;border:1px solid var(--line);background:var(--surface2);border-radius:12px;padding:12px 13px;margin-bottom:9px}
.pnode-row .st{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:12px;flex-shrink:0;font-weight:800}
.pnode-row .st.ok{background:rgba(190,226,78,.12);color:var(--good)}
.pnode-row .st.found{background:var(--prov-pending-bg);color:var(--state-attention)}
.pnode-row .st.need{background:rgba(255,255,255,.05);color:var(--na)}
.pnode-row .rt{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.35}
.pnode-row .rs{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.45}
.star{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;z-index:4}
.star .avatar{margin:0 auto;width:82px;height:82px;border-radius:50%;border:1px solid rgba(200,240,77,.55);box-shadow:0 0 30px rgba(200,240,77,.22);overflow:hidden;animation:starglow 4.5s ease-in-out infinite}
@keyframes starglow{0%,100%{box-shadow:0 0 24px rgba(200,240,77,.20)}50%{box-shadow:0 0 40px rgba(200,240,77,.40)}}
.star .name{margin-top:8px;font-family:var(--serif);font-weight:700;font-size:15px;color:var(--text)}
.star .gtag{margin-top:5px}
.miles{display:flex;flex-wrap:wrap;gap:6px 15px;align-items:center;margin-top:16px}
.mile{display:flex;align-items:center;gap:7px}
.mile .md{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mile.done .md{background:var(--accent)}
.mile.current .md{background:var(--text);box-shadow:0 0 0 3px rgba(200,240,77,.35)}
.mile.next .md{border:1px solid var(--line2)}
.mile .ml{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase}
.mile.done .ml{color:var(--muted)}.mile.current .ml{color:var(--text);font-weight:700}.mile.next .ml{color:var(--faint)}
.scan-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.scan-chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:6px 12px;font-size:12px;color:var(--text)}
.scan-chip .sd{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.scan-chip .mono{font-size:9px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase}
.next-card{border:1px solid rgba(200,240,77,.22);background:linear-gradient(180deg,var(--forest-2),var(--surface2));border-radius:16px;padding:14px 18px;box-shadow:0 0 18px -6px rgba(200,240,77,.18);display:flex;align-items:center;gap:14px;margin-top:0}
.next-card .t{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--text);line-height:1.25;margin-top:2px}
.next-card .w{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:3px}
/* ── DEPTH · a faint starfield behind the universe (parallax-friendly, cheap) ── */
.starfield{position:absolute;inset:0;z-index:0;pointer-events:none;border-radius:50%;
  background:
    radial-gradient(1.5px 1.5px at 20% 30%,rgba(243,240,232,.5),transparent),
    radial-gradient(1.5px 1.5px at 75% 22%,rgba(243,240,232,.35),transparent),
    radial-gradient(1px 1px at 40% 70%,rgba(243,240,232,.4),transparent),
    radial-gradient(1px 1px at 82% 66%,rgba(243,240,232,.3),transparent),
    radial-gradient(1.5px 1.5px at 60% 86%,rgba(243,240,232,.3),transparent),
    radial-gradient(1px 1px at 30% 52%,rgba(243,240,232,.25),transparent),
    radial-gradient(1px 1px at 88% 42%,rgba(243,240,232,.25),transparent);
  animation:twinkle 5s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.5}50%{opacity:.9}}
/* ── SONAR · a slow ring breathing out from the star — "living intelligence" ── */
.sonar{position:absolute;left:50%;top:50%;width:14%;height:14%;transform:translate(-50%,-50%);
  border-radius:50%;border:1px solid rgba(200,240,77,.30);z-index:0;pointer-events:none;
  animation:sonar 5s ease-out infinite}
.sonar.s2{animation-delay:2.5s}
@keyframes sonar{0%{opacity:.5;width:14%;height:14%}80%{opacity:0}100%{opacity:0;width:94%;height:94%}}
/* ── CONSTELLATION · a line from every proof-dimension into the artist star.
      Confirmed dimensions glow lime and pulse energy inward — growth you can SEE;
      dimensions that still need you stay a quiet amber thread. ── */
.constel{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:visible}
.constel line{fill:none;transition:stroke .4s,opacity .4s}
.cl-needs{stroke:rgba(221,227,217,.28);stroke-width:.5}
.cl-dev{stroke:rgba(70,220,194,.5);stroke-width:.6;stroke-dasharray:1.2 4.5;filter:drop-shadow(0 0 2px rgba(70,220,194,.4));animation:flowDev 4s linear infinite}
.cl-locked{stroke:rgba(255,255,255,.06);stroke-width:.5}
.cl-lit{stroke:rgba(200,240,77,.62);stroke-width:.7;stroke-dasharray:1.4 4;filter:drop-shadow(0 0 3px rgba(200,240,77,.55));animation:flowLit 2.6s linear infinite}
@keyframes flowDev{to{stroke-dashoffset:-22.8}}
@keyframes flowLit{to{stroke-dashoffset:-21.6}}
/* per-planet plain-language state word — instant meaning at a glance, never a score */
.pstate{margin-top:3px;font-family:var(--mono);font-size:10px;letter-spacing:.02em;line-height:1.2}
.pstate.s-needs{color:var(--need)}.pstate.s-lit{color:var(--good)}.pstate.s-dev{color:var(--teal)}.pstate.s-locked{color:var(--faint)}
.plabel .gstar{color:var(--mist)}
@media(prefers-reduced-motion:reduce){
  .sweep,.sonar,.starfield,.cl-lit,.cl-dev,.pnode,.star .avatar,.founddot,.hint-pulse::after{animation:none!important}
}

/* ═══ RADAR WORKSPACE · one-screen inspector (desktop 4-zone · mobile bottom-sheet) ═══ */
.radar-work{flex:1 1 auto;min-height:0;display:grid;gap:12px 14px;
  grid-template-columns:196px minmax(0,1fr) 360px;
  grid-template-rows:auto minmax(0,1fr) auto;
  grid-template-areas:"scene scene scene" "ident stage inspect" "dock dock dock";position:relative}
.rwscene{grid-area:scene;position:relative;display:flex;justify-content:center;align-items:center}
.rwident{grid-area:ident;display:flex;flex-direction:column;gap:12px;min-height:0;overflow:auto}
.rwstage{grid-area:stage;min-height:0}
.rwinsp{grid-area:inspect;min-height:0}
.rwdock{grid-area:dock}
/* ── scene lens · top-center segmented control (never overlays the act card) ── */
.seg-lab{position:absolute;left:2px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted)}
.scene-seg{display:inline-flex;gap:3px;background:var(--surface-3);border:1px solid var(--border);border-radius:999px;padding:4px}
.scene-seg .seg-btn{border:0;background:transparent;color:var(--text-muted);font-size:12.5px;font-weight:700;padding:7px 16px;border-radius:999px;transition:.14s;white-space:nowrap}
.scene-seg .seg-btn:hover{color:var(--text)}
.scene-seg .seg-btn.on{background:linear-gradient(180deg,var(--accent),var(--accent-deep));color:var(--on-accent);box-shadow:var(--shadow-1)}
/* ── identity column ── */
.idcard{background:var(--surface);border:1px solid var(--line2);border-radius:16px;padding:14px;box-shadow:var(--shadow-1)}
.idcard .idpic{width:52px;height:52px;border-radius:50%;overflow:hidden;border:1px solid rgba(200,240,77,.55);box-shadow:0 0 16px -6px rgba(200,240,77,.45);margin-bottom:10px}
.idcard .idname{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text);line-height:1.15}
.idpriv{display:flex;align-items:flex-start;gap:7px;margin-top:12px;font-size:11.5px;line-height:1.45;color:var(--text-muted)}
.idpriv .pd{width:8px;height:8px;border-radius:50%;background:var(--text-faint);flex-shrink:0;margin-top:4px}
.idpriv.live{color:var(--text)}
.idpriv.live .pd{background:var(--accent);box-shadow:0 0 8px rgba(200,240,77,.6)}
.rwident .lensrail{display:flex;background:var(--surface3);border:1px solid var(--line2);border-radius:999px;padding:3px}
.rwident .lensrail .rf{flex:1;justify-content:center;background:transparent;border:1px solid transparent;color:var(--text-muted);padding:6px 8px}
.rwident .lensrail .rf.active{background:var(--surface-4);border-color:var(--border);color:var(--text)}
/* ── inspector panel ── */
.insp-panel{background:var(--surface);border:1px solid var(--line2);border-radius:16px;box-shadow:var(--shadow-card);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;animation:inspIn .26s var(--ease-orbit)}
@keyframes inspIn{from{opacity:.3;transform:translateX(14px)}to{opacity:1;transform:none}}
.insp-grab{display:none}
.insp-head{display:flex;align-items:center;gap:11px;padding:15px 16px 12px;border-bottom:1px solid var(--line)}
.insp-head .insp-ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:var(--surface3);border:1px solid var(--line2);color:var(--text);flex-shrink:0}
.insp-head .insp-ic svg{width:22px;height:22px}
.insp-head h3{font-size:17px;color:var(--text);line-height:1.2}
.insp-x{margin-left:auto;background:var(--surface3);border:1px solid var(--line2);border-radius:9px;color:var(--text-muted);width:30px;height:30px;flex-shrink:0;font-size:16px;line-height:1}
.insp-x:hover{color:var(--text)}
.insp-scroll{flex:1 1 auto;min-height:0;overflow:auto;padding:0}
.insp-explain{font-size:14.5px;font-weight:600;color:var(--text);line-height:1.45;margin:0 0 12px}
.insp-star{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--text);background:var(--prov-confirmed-bg);border:1px solid var(--prov-confirmed-line);border-radius:999px;padding:4px 10px;margin-top:6px}
/* ── 3-layer action widget: Meaning · Found proof · Next action ── */
.insp-layer{padding:13px 16px;border-bottom:1px solid var(--line)}
.insp-layer-lab{display:block;font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px}
.insp-meaning{margin:0;font-size:15px;font-weight:600;color:var(--text);line-height:1.4}
.insp-found{margin:0 0 10px;font-size:13.5px;color:rgb(64,72,66);line-height:1.45}
.insp-fromsrc{font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--text);letter-spacing:0}
.insp-found b{color:var(--text)}
.insp-srclist{display:flex;flex-direction:column;gap:7px;margin-bottom:11px}
.insp-status-chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text);background:var(--surface-3);border:1px solid var(--border);border-radius:999px;padding:5px 11px}
.insp-status-chip.pub{background:var(--prov-confirmed-bg);border-color:var(--prov-confirmed-line)}
.insp-status-chip .insp-lock{font-size:11px;line-height:1}
.insp-block{margin-bottom:13px}
.insp-block .insp-lab{display:block;font-family:var(--mono);font-size:8.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-faint);margin-bottom:5px}
.insp-block>p{margin:0;font-size:13px;color:var(--text-muted);line-height:1.5}
.insp-status{display:flex;align-items:flex-start;gap:8px;color:var(--text)!important;font-weight:600}
.insp-status .insp-lock{flex-shrink:0}
.insp-src{display:flex;align-items:center;gap:10px;border:1px solid var(--line);background:var(--surface3);border-radius:11px;padding:8px 10px;margin-bottom:7px}
.insp-src .insp-lg{width:26px;height:26px;border-radius:7px;overflow:hidden;flex-shrink:0;display:inline-flex}
.insp-srcmeta{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1}
.insp-srcmeta .insp-plat{font-size:12.5px;font-weight:700;color:var(--text)}
.insp-tag{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.01em;padding:3px 9px;border-radius:999px;border:1px solid var(--line2);color:var(--text-muted);flex-shrink:0}
.insp-tag.ok{color:var(--text);border-color:var(--prov-confirmed-line);background:var(--prov-confirmed-bg)}
.insp-tag.found{color:var(--text-muted)}
.insp-add{font-size:11.5px;color:var(--text-muted)}
.insp-foot{padding:13px 16px 15px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
.insp-cta{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;border-radius:12px;
  font-weight:800;font-size:14px;color:var(--on-accent);background:linear-gradient(180deg,var(--accent),var(--accent-deep));border:0;box-shadow:var(--glow)}
.insp-cta:hover{filter:brightness(1.05)}
.insp-sec{align-self:center;background:transparent;border:0;font-size:12px;font-weight:600;color:var(--text-muted);padding:2px 4px}
.insp-sec:hover{color:var(--text);text-decoration:underline}
/* ── selected planet + orbiting source satellites ── */
.planet.selected{z-index:6}
.planet.selected .pnode{transform:scale(1.16);border-color:rgba(200,240,77,.8);box-shadow:0 0 30px rgba(200,240,77,.45),inset 0 0 0 1px rgba(200,240,77,.6);animation-play-state:paused}
.planet.selected .plabel{color:var(--text)}

.gcard.urgent{border-color:rgba(221,227,217,.30)}
.gc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.gc-top .av{width:42px;height:42px;border-radius:12px;flex-shrink:0}
.act-tag{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);border:1px solid var(--line);border-radius:6px;padding:2px 6px;margin-left:6px}
.found-line{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);background:var(--surface2);border-radius:12px;padding:11px 13px;font-size:12.5px;color:var(--text)}
.found-line .why{display:block;color:var(--muted);font-size:11.5px;margin-top:3px;line-height:1.5}
.found-line .spark{color:var(--text-muted)}
.strip{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0}

/* production events */
.evcard{border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:16px 18px;margin-bottom:12px}
.slot{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--surface2);margin-top:9px}

/* admin cockpit */
.gate{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
.g-tile{border:1px solid var(--line);background:var(--surface);border-radius:14px;padding:14px}
.g-tile .v{font-family:var(--serif);font-size:30px;color:var(--text);line-height:1}
.g-tile.met{border-color:rgba(200,240,77,.3)}
.g-tile .evt{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-top:7px;letter-spacing:.03em}
.frow{display:flex;align-items:center;gap:12px;padding:8px 0;font-size:12.5px}
.frow .nm{width:150px;flex-shrink:0;color:var(--text)}
.frow .nm span{display:block;font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.03em}
.frow .track{flex:1;height:9px;border-radius:6px;background:var(--surface2);overflow:hidden}
.frow .track .fill{height:100%;background:var(--accent)}
.frow .track .fill.g{background:var(--state-attention)}.frow .track .fill.b{background:var(--source-blue)}
.frow .ct{width:34px;text-align:right;font-family:var(--mono);color:var(--muted)}
.ledger-row{display:flex;justify-content:space-between;font-size:12.5px;padding:7px 0;border-top:1px solid var(--line);color:var(--muted)}
.ledger-row span:last-child{font-family:var(--mono);color:var(--text)}

/* ═══ PAPER (buyer public passport) ═══ */
.paper .pp{color:#0A0D0B;min-height:100%}
.paper .body{display:block;flex:none;max-width:660px;margin:0 auto;padding:0 26px 40px}
.paper .hero .photo{position:relative;height:300px;background:
   radial-gradient(90% 70% at 72% 12%, rgba(200,240,77,.30), rgba(200,240,77,0) 52%),
   radial-gradient(60% 55% at 40% 84%, rgba(120,60,26,.55), rgba(120,60,26,0) 60%),
   linear-gradient(180deg,#241a13 0%,#150f0c 46%,#0b0c0b 100%)}
.paper .hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,12,11,.42) 0%,rgba(11,12,11,.62) 62%,#F3F5EF 100%)}
.paper .hero .topbar2{position:absolute;inset:20px 26px auto;display:flex;align-items:center;justify-content:space-between;z-index:6}
.paper .hero .topbar2 .wm{font-family:var(--serif);font-weight:700;font-size:19px;color:#fff;display:inline-flex;align-items:center;gap:8px}
.paper .hero .topbar2 .wm .d{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px rgba(200,240,77,.7)}
.paper .idblock{position:relative;z-index:6;max-width:660px;margin:-96px auto 0;padding:0 26px}
.paper .eyebrowp{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:#687269}
.paper .genreline{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#18221A;opacity:.62;margin-top:10px}
.paper h1.name{font-size:clamp(38px,6vw,56px);line-height:1;letter-spacing:-.02em;margin-top:4px;color:#18221A}
.paper .oneline{font-size:16.5px;line-height:1.5;color:#3a423b;max-width:52ch;margin-top:12px}
.paper .persona{display:inline-flex;background:#fff;border:1px solid rgba(24,34,26,.17);border-radius:999px;padding:5px;margin-top:20px;box-shadow:0 6px 18px -12px rgba(0,0,0,.4)}
.paper .persona button{border:0;background:transparent;font-weight:600;font-size:13px;color:#687269;padding:9px 16px;border-radius:999px;min-height:38px}
.paper .persona button.on{background:var(--accent);color:#12160A;box-shadow:0 8px 18px -8px rgba(174,218,54,.7)}
.paper .nolove{display:flex;align-items:center;gap:11px;margin-top:20px;padding:11px 15px;border:1px solid rgba(24,34,26,.1);background:linear-gradient(90deg,rgba(200,240,77,.10),rgba(200,240,77,.02));border-radius:13px}
.paper .nolove .k{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:rgba(200,240,77,.2);color:#48620A;font-size:14px;flex:none}
.paper .nolove p{margin:0;font-size:12.5px;color:#3a423b}
.paper .nolove p b{color:#18221A}
.paper .nolove .mini{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#687269;margin-left:auto}
.paper .sec{margin-top:36px}.paper .sec.first{margin-top:28px}
.paper .sec>h2{font-family:var(--serif);font-size:22px;color:#18221A}
.paper .sec .cap{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#98A19A;margin-top:6px}
.paper .grid{margin-top:14px;display:grid;gap:12px}
.paper .proof{background:#fff;border:1px solid rgba(24,34,26,.1);border-radius:18px;padding:18px;box-shadow:0 10px 30px -22px rgba(0,0,0,.5)}
.paper .proof .bignum{font-family:var(--mono);font-size:28px;font-weight:700;color:#18221A;line-height:1.05}
.paper .proof .claim{font-size:18px;font-weight:700;color:#0A0D0B;line-height:1.32}
.paper .proof .ctx{font-size:13.5px;color:#687269;margin-top:4px}
.paper .proof .foot{display:flex;flex-wrap:wrap;align-items:center;gap:9px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(24,34,26,.1)}
.paper .methodp{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-radius:999px;padding:4px 10px}
.paper .methodp.gold{color:#687269;border:1px solid rgba(24,34,26,.22);background:rgba(24,34,26,.05)}
.paper .methodp.evidence{color:#48620A;border:1px solid rgba(174,218,54,.55);background:rgba(200,240,77,.12)}
.paper .methodp.source{color:#687269;border:1px solid rgba(24,34,26,.17);background:rgba(24,34,26,.03)}
.paper .methodp.declared{color:#98A19A;border:1px solid rgba(24,34,26,.12);background:transparent}
.paper .methodp.lime{color:#48620A;border:1px solid rgba(174,218,54,.7);background:rgba(200,240,77,.18)}
.paper .methodp.na{color:#687269;border:1px solid rgba(24,34,26,.17);background:rgba(24,34,26,.04)}
.paper .band{display:inline-flex;align-items:center;font-family:var(--mono);font-size:12.5px;font-weight:600;color:#0A0D0B;border:1px solid rgba(24,34,26,.17);background:#fff;border-radius:999px;padding:4px 12px}
.paper .rev{margin-left:auto;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:#98A19A}
.paper .ready{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.paper .chip-ready{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid rgba(24,34,26,.17);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:600;color:#0A0D0B}
.paper .chip-ready .ck{color:var(--accent-deep);font-weight:800}
.paper .track2{background:#fff;border:1px solid rgba(24,34,26,.1);border-radius:18px;padding:2px 18px;margin-top:14px;box-shadow:0 10px 30px -22px rgba(0,0,0,.5)}
.paper .track2 .r{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid rgba(24,34,26,.1);font-size:14.5px;color:#0A0D0B}
.paper .track2 .r:last-child{border-bottom:0}
.paper .track2 .r .d{color:#98A19A}
.paper .btn-primaryp{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:800;font-size:15px;color:#12160A;background:linear-gradient(180deg,var(--accent),var(--accent-deep));border:0;border-radius:13px;padding:15px 26px;box-shadow:0 14px 30px -12px rgba(174,218,54,.7);min-height:52px;width:100%}
.paper .cta-sub{font-size:12px;color:#687269;margin-top:11px;text-align:center}
.paper .pfoot{margin-top:44px;border-top:1px solid rgba(24,34,26,.1);padding:20px 0 10px}
.paper .fwstrip{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.paper .fwstrip span{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:#687269;border:1px solid rgba(24,34,26,.1);border-radius:999px;padding:4px 10px;background:#fff}
/* buyer request form (paper) */
.paper .req{padding:26px 30px 40px;min-height:100%}
.paper .req h1{font-size:26px;color:#18221A}
.paper .req .sub{font-size:14px;color:#687269;margin:8px 0 20px}
.paper .form{background:#fff;border:1px solid rgba(24,34,26,.1);border-radius:20px;padding:22px;box-shadow:0 24px 60px -34px rgba(0,0,0,.5)}
.paper .fld{margin-bottom:15px}
.paper .flabel{display:block;font-size:12.5px;font-weight:700;color:#687269;margin-bottom:7px}
.paper .flabel .star{color:#8A5A17}
.paper .inp,.paper .sel,.paper .ta{width:100%;background:#fbfcfa;border:1px solid rgba(24,34,26,.17);border-radius:11px;padding:12px 14px;font-family:var(--sans);font-size:15px;color:#0A0D0B}
.paper .inp:focus{border-color:var(--accent-deep);box-shadow:0 0 0 3px rgba(200,240,77,.22);outline:none;background:#fff}
.paper .ta{min-height:80px;resize:none}
.paper .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.paper .confirm{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;text-align:center}
.paper .confcard{background:#fff;border:1px solid rgba(24,34,26,.1);border-radius:20px;padding:30px 28px;max-width:400px;width:100%;box-shadow:0 30px 70px -36px rgba(0,0,0,.5)}
.paper .check{width:58px;height:58px;border-radius:50%;background:linear-gradient(180deg,var(--accent),var(--accent-deep));color:#12160A;display:grid;place-items:center;font-size:28px;font-weight:900;margin:0 auto 16px;box-shadow:0 16px 34px -12px rgba(174,218,54,.7)}
.paper .confcard h1{font-size:23px;color:#18221A}
.paper .confcard .cbody{color:#687269;font-size:14.5px;margin-top:9px}
.paper .keepbox{margin-top:20px;border:1px solid rgba(24,34,26,.1);background:#fbfcfa;border-radius:14px;padding:14px;text-align:left}
.paper .keeprow{display:flex;align-items:center;gap:9px;margin-top:11px}
.paper .keepurl{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);font-size:11px;color:#687269;background:#fff;border:1px solid rgba(24,34,26,.1);border-radius:9px;padding:9px 11px}
.paper .copybtn{flex:none;font-size:12px;font-weight:700;color:#18221A;background:#fff;border:1px solid rgba(24,34,26,.17);border-radius:9px;padding:9px 14px}
.paper .backlink{display:inline-block;margin-top:18px;font-size:13.5px;color:#687269;cursor:pointer}

/* ═══ source-confirmer (accountless dark) ═══ */
.confirmer-wrap{max-width:560px;margin:0 auto;padding:8px 6px}
.cf-asker{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cf-asker .av{width:44px;height:44px;border-radius:12px;background:conic-gradient(from 210deg,#6EA6A3,#46DCC2,#C8F04D);display:grid;place-items:center;font-weight:800;color:#0B0C0B;font-family:var(--mono)}
.cf-claim{border:1px solid var(--line2);background:var(--surface2);border-radius:14px;padding:16px}
.cf-claim .q{font-family:var(--serif);font-size:18px;line-height:1.4;color:var(--text)}
.cf-claim .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:9px}
.cf-means{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.cf-col{border:1px solid var(--line);border-radius:12px;padding:13px;background:var(--surface)}
.cf-col h4{font-size:12px;margin:0 0 8px;font-family:var(--sans);font-weight:800}
.cf-col.pos h4{color:var(--good)}.cf-col.neg h4{color:var(--need)}
.cf-col ul{margin:0;padding-left:16px;font-size:11.5px;color:var(--muted);line-height:1.6}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:1px solid var(--line);background:var(--surface2);border-radius:12px;padding:13px 14px;color:var(--text);margin-bottom:9px}
.opt:hover{border-color:var(--line2)}
.opt.primary{border-color:rgba(200,240,77,.5);background:linear-gradient(180deg,rgba(200,240,77,.08),var(--surface2))}
.opt.warn:hover{border-color:rgba(240,180,120,.5)}
.opt .ic{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--bg2);border:1px solid var(--line);flex-shrink:0}
.opt.primary .ic{color:var(--accent)}
.opt .t{font-size:13.5px;font-weight:700;display:block}
.opt .d{font-size:11px;color:var(--muted);display:block;margin-top:2px}
.opt .arw{margin-left:auto;color:var(--faint)}
.cf-done{text-align:center;padding:20px}
.cf-done .big{width:66px;height:66px;border-radius:50%;background:linear-gradient(180deg,var(--accent),var(--accent-deep));color:#12160A;display:grid;place-items:center;font-size:30px;font-weight:900;margin:0 auto 18px;box-shadow:var(--glow)}

/* welcome + modal overlay */
.overlay{position:absolute;inset:0;z-index:60;background:rgba(6,7,6,.82);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .2s ease;max-height:100dvh;overflow:hidden}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{max-width:460px;width:100%;background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--line2);border-radius:20px;padding:26px;box-shadow:var(--card-shadow);animation:pop .22s ease}
.modal h2{font-size:23px;margin-bottom:8px}
.modal p{font-size:13.5px;color:var(--muted);line-height:1.6;margin:0 0 8px}
.modal .role-line{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:rgba(200,240,77,.08);border:1px solid rgba(200,240,77,.25);border-radius:999px;padding:5px 11px;margin-bottom:14px}
.modal .flows{list-style:none;padding:0;margin:14px 0;display:flex;flex-direction:column;gap:8px}
.modal .flows li{display:flex;gap:10px;align-items:center;font-size:12.5px;color:var(--text);background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:9px 12px}
.modal .flows li b{color:var(--accent)}
.modal .actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}

/* toast */
.toast{position:absolute;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);z-index:70;
  display:inline-flex;align-items:center;gap:9px;border:1px solid rgba(200,240,77,.3);background:var(--surface);
  border-radius:12px;padding:11px 16px;font-size:12.5px;font-weight:600;color:var(--text);box-shadow:var(--card-shadow);
  opacity:0;pointer-events:none;transition:.3s}
.toast .d{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.win{border-color:rgba(200,240,77,.45);background:linear-gradient(180deg,var(--surface),var(--bg2))}
.toast.win .d{background:var(--accent);box-shadow:0 0 10px rgba(200,240,77,.8)}

/* ═══ CONTEXTUAL ATMOSPHERE HEADER (real photo, darkened) ═══ */
.atmos-header{position:relative;height:96px;margin:-26px -30px 20px;background-size:cover;background-position:50% 42%;
  border-bottom:1px solid var(--line);display:flex;align-items:flex-end;padding:12px 30px}
.atmos-header::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,8,7,.55) 0%,rgba(7,8,7,.72) 60%,rgba(11,12,11,.96) 100%)}
.atmos-cap{position:relative;z-index:2;font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(243,240,232,.72)}

/* ═══ GAMIFICATION — journey progress game track ═══ */
.journey{border:1px solid var(--line);background:linear-gradient(180deg,var(--surface),var(--bg2));border-radius:18px;padding:15px 18px 17px;margin-top:16px;position:relative;overflow:hidden}
.journey::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent),var(--teal))}
.jhead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.jhead .jt{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
.jhead .jt .spark{color:var(--accent)}
.jcount{font-family:var(--mono);font-size:11px;color:var(--text);background:var(--surface2);border:1px solid var(--line2);border-radius:999px;padding:4px 11px}
.jcount b{color:var(--accent);font-weight:800}
.jtrack{position:relative;display:flex;align-items:flex-start;justify-content:space-between;gap:2px}
.jtrack .jline{position:absolute;left:9px;right:9px;top:9px;height:3px;border-radius:2px;background:var(--surface2);overflow:hidden}
.jtrack .jline .jfill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:2px;width:0;transition:width 1s cubic-bezier(.3,.8,.3,1)}
.jstep{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0}
.jstep .jn{width:19px;height:19px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--line2);display:grid;place-items:center;font-family:var(--mono);font-size:9px;font-weight:800;color:var(--faint);transition:.3s}
.jstep .jl{font-family:var(--mono);font-size:7.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);text-align:center;line-height:1.25;max-width:60px}
.jstep.done .jn{background:var(--accent);border-color:var(--accent);color:#12160A}
.jstep.done .jl{color:var(--muted)}
.jstep.current .jn{background:var(--text);border-color:var(--accent);color:#12160A;box-shadow:0 0 0 4px rgba(200,240,77,.28),0 0 18px rgba(200,240,77,.4);animation:jglow 1.8s ease-in-out infinite}
.jstep.current .jl{color:var(--text);font-weight:700}
.jstep.next .jn{animation:jpulse 1.8s ease-in-out infinite}
@keyframes jglow{0%,100%{box-shadow:0 0 0 4px rgba(200,240,77,.22),0 0 14px rgba(200,240,77,.3)}50%{box-shadow:0 0 0 6px rgba(200,240,77,.34),0 0 26px rgba(200,240,77,.55)}}
@keyframes jpulse{0%,100%{border-color:var(--line2)}50%{border-color:rgba(221,227,217,.7);box-shadow:0 0 12px rgba(221,227,217,.3)}}

/* planet locked/unlock feel + real hover glow */
.pnode.locked{opacity:.4;filter:grayscale(.6)}
.pnode.locked svg{opacity:.5}
.planet .plock{position:absolute;bottom:-2px;right:-2px;width:15px;height:15px;border-radius:50%;display:grid;place-items:center;font-size:8px;background:var(--surface);color:var(--faint);box-shadow:0 0 0 1px var(--bg2)}
.pnode .thumb{position:absolute;inset:3px;border-radius:50%;object-fit:cover;opacity:.9}

/* platform ring — real connected sources */
.platform-ring{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:4px}
.pr-logo{width:30px;height:30px;border-radius:9px;background:#F3F5EF;display:grid;place-items:center;box-shadow:0 2px 8px -2px rgba(0,0,0,.5);position:relative;transition:.18s}
.pr-logo:hover{transform:translateY(-2px) scale(1.06);box-shadow:0 6px 16px -4px rgba(200,240,77,.4)}
.pr-logo.off{filter:grayscale(1);opacity:.45}
.pr-logo svg{width:20px;height:20px}
.pr-logo .dot{position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--bg2)}
.pr-cap{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-left:4px}

/* media / evidence real thumbnails */
.media-thumb{border-radius:12px;overflow:hidden;border:1px solid var(--line);position:relative}
.media-thumb img{display:block;width:100%;height:100%;object-fit:cover}
.media-thumb .plc{position:absolute;left:9px;bottom:8px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7)}

/* ── NEXT-BEST-STEP · one computed action from planet state, respecting the
      active scene's primaries and the Kit→Live lock. Firewall-safe: action +
      reason only, never a count/score. Returns {planetId, mode, eyebrow, title,
      why, cta}. mode ∈ confirm | add | publish. ── */
function nextBestStep(){
  const pm=planetModel();
  const EYE='Your next move';
  // 1 · genre-primary planet in needs with found items waiting
  const gp=pm.filter(p=>p.genre&&p.state==='needs'&&p.found>0);
  if(gp.length){ return {planetId:gp[0].id,mode:'confirm',eyebrow:EYE,
    title:'Confirm your live-draw proof',
    why:'One tap turns what we found into a strength on your Passport. Nothing goes public until you say so.',
    cta:'Continue &rarr;'}; }
  // 2 · any planet in needs with found items
  const anyF=pm.filter(p=>p.state==='needs'&&p.found>0);
  if(anyF.length){ return {planetId:anyF[0].id,mode:'confirm',eyebrow:EYE,
    title:'Confirm what we found',
    why:'One tap turns a discovery into a strength on your Passport — nothing is public until you confirm it.',
    cta:'Continue &rarr;'}; }
  // 3 · a locked planet (Kit) → surface the unlock action (back Live first)
  if(pm.some(p=>p.state==='locked')){ return {planetId:'live',mode:'add',eyebrow:EYE,
    title:'Back your Live Show first',
    why:'Your Professional Kit opens once your live draw is backed.',
    cta:'Continue &rarr;'}; }
  // 5 · all six lit → the one legitimate hand-off
  if(pm.every(p=>p.state==='lit')){ return {planetId:null,mode:'publish',eyebrow:EYE,
    title:'Publish your Passport',
    why:'Your proof is ready — let a booking manager read your verified strengths.',
    cta:'Open your Passport &rarr;'}; }
  // 4 · a genre-primary (or any) still-developing planet → add the missing proof
  const gap=pm.find(p=>p.genre&&p.state!=='lit') || pm.find(p=>p.state!=='lit');
  return {planetId:(gap&&gap.id)||'live',mode:'add',eyebrow:EYE,
    title:'Add proof of your draw',
    why:'Supports how professionals read your live demand — not just your online reach.',
    cta:'Continue &rarr;'};

function renderSelectionLogos(){
  const uni=$('#uni'); if(!uni) return;
  uni.querySelectorAll('.sat-layer').forEach(e=>e.remove());
  const id=S.artist.sel; if(!id||!PLANET_XY[id]) return;
  if(id==='kit'&&!S.artist.liveLit) return; // locked kit shows no orbiting evidence
  const src=planetSources()[id]||[]; if(!src.length) return;
  const RM=reducedMotion();
  const xy=PLANET_XY[id], px=xy[0], py=xy[1];
  const base=Math.atan2(50-py,50-px);         // inward, toward the star
  const N=src.length, spread=(N>1?84:0)*Math.PI/180, R=17;
  const layer=document.createElement('div'); layer.className='sat-layer';
  src.forEach((it,i)=>{
    const ang=base+(N>1?spread*((i-(N-1)/2)/(N-1)):0);
    const sx=px+R*Math.cos(ang), sy=py+R*Math.sin(ang);
    const st=it.status, just=(S.artist.justLockLogo===it.id);
    const cls=['sat','sat-'+st,(just?'just':(RM?'':'emerge'))].filter(Boolean).join(' ');
    const chk=st==='confirmed'?'<span class="sat-chk">&#10003;</span>':'';
    const el=document.createElement('div'); el.className=cls;
    el.style.left=sx.toFixed(2)+'%'; el.style.top=sy.toFixed(2)+'%';
    if(!RM&&!just) el.style.animationDelay=(i*55)+'ms';
    el.setAttribute('title',platName(it.key)+' · '+(st==='confirmed'?'Confirmed':st==='found'?'Found on '+platName(it.key):'Add this source'));
    el.innerHTML='<span class="sat-in">'+srcMark(it.key,42)+chk+'</span>';
    layer.appendChild(el);
  });
  uni.appendChild(layer);
  if(S.artist.justLockLogo){
    const pl=uni.querySelector('.planet.selected .pnode');
    if(pl){ const ur=win.getBoundingClientRect(), pr=pl.getBoundingClientRect();
      bloomAt(pr.left-ur.left+pr.width/2, pr.top-ur.top+pr.height/2); }
    setTimeout(()=>{ S.artist.justLockLogo=null; },650);
  }
}

     away, except the terminal publish hand-off (Passport is a different surface). */
  nextStep(){ const n=nextBestStep(); if(n.mode==='publish'){ S.artist.orbit=null; nav('artist','passport'); return; } if(n.planetId){ focusPlanet(n.planetId); } },
  openPlanet(el){ focusPlanet(el.dataset.planet); },

  dismissTop(el){ const p=el.dataset.planet; const it=(planetSources()[p]||[]).find(x=>x.status==='found');
    if(it){ S.artist.dismissed[it.id]=true; renderShell(); toast('Marked “not you” — it won’t show on your Passport'); } },
  focusLogo(el){ if(!S.artist.orbit) return; S.artist.orbit.logo=el.dataset.id; renderShell(); },
  exitOrbit(){ S.artist.orbit=null; renderShell(); },
  closePsheet(){ closePsheet(); },
  /* DISCOVER→CONFIRM · one tap confirms a found source item; the planet lights,
     the journey advances, and a small celebration mints the moment. */
  confirmItem(el){
    const id=el.dataset.id, planet=el.dataset.planet;
    if(S.artist.confirmed[id]) return;
    const wasLive=S.artist.liveLit;
    S.artist.confirmed[id]=true;
    if(id==='lv-ig'){ S.artist.liveLit=true; S.artist.justLit='live'; }
    // stay in the orbit; collapse the card; light the just-confirmed logo IN PLACE
    if(S.artist.orbit && S.artist.orbit.planet===planet){ S.artist.orbit.logo=null; }
    S.artist.justLockLogo=id;
    renderShell();  // renderOrbit re-runs, applies .justlock + bloomAt at the logo center
    const meta=planetMeta()[planet]||{found:0,conf:0};
    const nm=(PLANET_INFO[planet].name||'').replace('&amp;','&');
    if(id==='lv-ig'&&!wasLive){
      confettiBurst(60); achievement('Live Show lit!','Your draw is backed · Professional Kit just unlocked','&#127775;');
    } else if(meta.found===0){
      confettiBurst(40); achievement(nm+' — all confirmed!','Every finding here is now backed by your confirmation','&#10022;');
    } else {
      achievement('Confirmed &#10003;','Added to your Radar — '+meta.found+' more found here','&#10003;');
    }
  },

    const id=el.dataset.id, planet=el.dataset.planet;
    S.artist.dismissed[id]=true;
    if(S.artist.orbit && S.artist.orbit.planet===planet){ S.artist.orbit.logo=null; }

/* build the focus layer INSIDE #uni (measured geometry; nothing scrolls) */
function renderOrbit(){
  const o=S.artist.orbit; if(!o) return;
  const uni=$('#uni'); if(!uni) return;
  const id=o.planet, info=PLANET_INFO[id]; if(!info) return;
  uni.classList.add('focused');
  // clear any prior orbit layer
  uni.querySelectorAll('.orbit-scrim,.orbit-layer').forEach(el=>el.remove());
  const U=uni.getBoundingClientRect().width||480;
  const RM=reducedMotion();
  const isMob=(function(){ try{ return window.matchMedia('(max-width:700px)').matches; }catch(e){ return U<520; } })();
  const Fx=50, Fy=isMob?34:40;                          // percent of U
  const hubCx=U*Fx/100, hubCy=U*Fy/100;                 // px
  const clamp=(v,a,b)=>Math.max(a,Math.min(v,b));
  const Rpx = isMob ? clamp(0.22*U,62,78) : clamp(0.19*U,88,116);
  const GAP = isMob?150:76, span=360-GAP, start = 270 + GAP/2;

  // scrim (tap = exit)
  const scrim=document.createElement('div'); scrim.className='orbit-scrim'; scrim.dataset.action='exitOrbit'; uni.appendChild(scrim);
  const layer=document.createElement('div'); layer.className='orbit-layer';

  const pm=planetModel(); const pmodel=pm.find(p=>p.id===id)||{state:'needs'};
  const word=PSTATE_WORD[pmodel.state]||'';

  // LOCKED kit before Live is backed → centered mini-card, no ring
  if(id==='kit' && !S.artist.liveLit){
    layer.innerHTML=
      '<div class="orbit-hub" style="left:'+Fx+'%;top:'+Fy+'%" data-action="exitOrbit">'+
        '<div class="pnode locked">'+I[info.icon]+'<span class="plock">&#128274;</span></div>'+
        '<div class="ocap"><b>'+info.name.replace('&amp;','&')+'</b><span>Locked</span></div></div>'+
      '<div class="orbit-locked"><div class="lk">&#128274;</div>'+
        '<div class="olt">Unlocks once your Live Show is backed</div>'+
        '<p>Confirm a live-draw finding first — then invoice, set length &amp; rider light up here.</p>'+
        '<button class="btn-primary sm" data-action="openLive">Go confirm your draw &rarr;</button></div>';
    uni.appendChild(layer); return;
  }

  const src=planetSources()[id]||[];
  const N=src.length;
  const logos=src.map((it,i)=>{
    const a=(N===1)?90:(start+span*(i/(N-1)));
    const rad=a*Math.PI/180;
    const X=Rpx*Math.cos(rad), Y=-Rpx*Math.sin(rad);
    const sel = o.logo===it.id;
    const dim = o.logo && o.logo!==it.id;
    const lock = S.artist.justLockLogo===it.id;
    const canEmerge = !RM && !o.logo && !S.artist.justLockLogo;
    const cls=['orbit-logo',it.status,(sel?'sel':''),(dim?'dimmed':''),(lock?'justlock':(canEmerge?'emerge':''))].filter(Boolean).join(' ');
    const chk = it.status==='confirmed' ? '<span class="chk">&#10003;</span>' : '';
    const delay = RM?'':(';animation-delay:'+(i*60)+'ms');
    return '<button class="'+cls+'" data-action="focusLogo" data-id="'+it.id+'" data-planet="'+id+'" '+
      'style="--to:translate('+X.toFixed(1)+'px,'+Y.toFixed(1)+'px)'+delay+'">'+
      '<span class="orbit-logo-inner">'+srcMark(it.key,38)+chk+'</span></button>';
  }).join('');
  const ringCls='orbit-ring'+((!RM&&!o.logo)?' spin':'')+(o.logo?' paused':'');

  layer.innerHTML=
    '<div class="orbit-hub" style="left:'+Fx+'%;top:'+Fy+'%" data-action="exitOrbit" role="button" aria-label="Back to your universe">'+
      '<div class="pnode '+{needs:'needs',lit:'lit',dev:'dev',locked:'locked'}[pmodel.state]+'">'+I[info.icon]+'</div>'+
      '<div class="ocap"><b>'+info.name.replace('&amp;','&')+'</b><span>'+word+'</span></div></div>'+
    '<div class="'+ringCls+'" style="left:'+Fx+'%;top:'+Fy+'%" role="dialog" aria-label="'+info.name.replace('&amp;','&')+' sources">'+logos+'</div>'+
    (o.logo ? orbitCard(src.find(x=>x.id===o.logo)||src[0], id) : '');
  uni.appendChild(layer);

  // card bottom placement + tether (measured; guarded)
  const card=layer.querySelector('.orbit-card');
  if(card){
    card.style.bottom=(isMob?12:16)+'px';
    // tether from selected logo → card top
    requestAnimationFrame(()=>{
      const sd=layer.querySelector('.orbit-logo.sel'); if(!sd||!card) return;
      const ur=uni.getBoundingClientRect(), lr=sd.getBoundingClientRect(), cr=card.getBoundingClientRect();
      const x1=lr.left-ur.left+lr.width/2, y1=lr.top-ur.top+lr.height/2;
      const x2=cr.left-ur.left+cr.width/2, y2=cr.top-ur.top;
      const svg='<svg class="orbit-tether" viewBox="0 0 '+ur.width+' '+ur.height+'"><line x1="'+x1.toFixed(0)+'" y1="'+y1.toFixed(0)+'" x2="'+x2.toFixed(0)+'" y2="'+y2.toFixed(0)+'"/></svg>';
      const holder=document.createElement('div'); holder.innerHTML=svg; const s=holder.firstChild; if(s) layer.insertBefore(s,card);
    });
  }
  if(S.artist.justLockLogo){
    const lk=layer.querySelector('.orbit-logo.justlock');
    if(lk){ const ur=uni.getBoundingClientRect(), lr=lk.getBoundingClientRect(), w=win.getBoundingClientRect();
      bloomAt(lr.left-w.left+lr.width/2, lr.top-w.top+lr.height/2); }
    setTimeout(()=>{ S.artist.justLockLogo=null; },650);
  }
}
/* gentle parallax — the universe tilts toward the pointer (desktop only) */
function setupParallax(){
  const uni=$('#uni'); if(!uni) return;
  const stage=uni.closest('.radar-stage'); if(!stage) return;
  if(window.matchMedia('(hover:none)').matches) return;
  stage.addEventListener('mousemove',e=>{
    const r=stage.getBoundingClientRect();
    const dx=((e.clientX-r.left)/r.width-.5), dy=((e.clientY-r.top)/r.height-.5);
    uni.style.transform='translate('+(dx*-10).toFixed(1)+'px,'+(dy*-10).toFixed(1)+'px)';
  });
  stage.addEventListener('mouseleave',()=>{ uni.style.transform=''; });
}

    s2sub:'מחפשים את המקורות שמנהלי הופעות בודקים — <b>בעברית, אנגלית ורוסית</b>, במקום שבו הקהל שלך נמצא. אנחנו קוראים רק את מה שפומבי — כלום לא מתפרסם וכלום לא מוכרע. את כל ממצא תאשר בעצמך.',
    s2market:'השוק שלך · ישראל', s2langs:'עברית · אנגלית · רוסית',
    s2caps:['קורא את הליינאפים באינסטגרם…','בודק דפי אירועים ב-Eventer וב-Go-Out…','מתאים את הקטלוג בספוטיפיי…','מחפש בעברית, אנגלית ורוסית…','סורק את Resident Advisor ואת Tickchak…','קורא את הנוכחות הפומבית שלך בישראל…'],
    s2foot:'אנחנו סורקים את הנוכחות הפומבית שלך בשוק שלך. סריקה אוטומטית רב-מקורית רחבה נמצאת בפיתוח — היום אנחנו מתחילים מהקישור שנתת.',
    s3eye:'שלב 3 מתוך 3 · אישור', s3h:'הנה מה שמצאנו',
    s3sub:'מצאנו את הטביעה שלך ב-<b>5 מקורות</b>. מכאן זה פשוט: אשר מה ששייך לך באמת. אתה לא בונה מאפס — אתה מאשר את מה שמצאנו.',
    s3rows:[['instagram','14 ליינאפים + טווח הקהילה שלך'],['spotify','קטלוג סטרימינג — 3 יציאות'],['residentadvisor','מופיע ב-6 דפי אירועים ב-RA'],['soundcloud','12 מיקסים וסטים'],['tiktok','קהל מעורב ועקבי']],
    s3tally:'8 ממצאים · כל אחד מסומן איך אנחנו יודעים אותו · כלום לא פומבי עד שתאשר',
    s3cta:'פתח את הראדאר ואשר &rarr;', s3explore:'אעדיף לחקור קודם',
    found:'נמצא', scanning:'סורקים את הנוכחות הפומבית שלך',
  },
};
let OB=null;
function obClear(){ if(OB&&OB.timers){ OB.timers.forEach(clearTimeout); OB.timers.forEach(clearInterval); OB.timers=[]; } }
function closeOnboarding(){ obClear(); const o=$('#onb'); if(o) o.remove(); OB=null; }
function obCapture(){ const n=$('#ob_name'), l=$('#ob_link'); if(n)OB.name=n.value; if(l)OB.link=l.value; }
function openOnboarding(){
  OB={step:1,lang:'en',name:'',link:'',timers:[]};
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='onb';
  win.appendChild(ov); renderOnboarding();
}
function obDots(step){
  return '<div class="ob-steps">'+[1,2,3].map(i=>'<span class="ob-dot '+(i<step?'done':i===step?'on':'')+'"></span>').join('')+'</div>';
}
/* U1: language switcher removed — onboarding is English-only. Hebrew strings
   in OBT.he are retained as dead data (localisation handled elsewhere later). */
function renderOnboarding(){
  const ov=$('#onb'); if(!ov||!OB) return;
  obClear();
  OB.lang='en';                 /* U1: English-only, no switcher */
  const L=OBT.en, dir='';
  const OB_MARK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="8.2"/><circle cx="12" cy="12" r="4.4"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><path d="M8.4 19.2 L5.5 23" opacity=".9"/><path d="M15.6 19.2 L18.5 23" opacity=".9"/></svg>';
  let inner='';
  if(OB.step===1){
    inner='<div class="ob-brandrow">'+OB_MARK+'<b>LOCK.</b></div>'+
      '<div class="ob-eyebrow">'+L.s1eye+'</div><h2>'+L.s1h+'</h2><p class="ob-sub">'+L.s1sub+'</p>'+
      '<div class="ob-fieldset">'+
        '<div><label class="label">'+L.s1name+'</label>'+
          '<input class="field" id="ob_name" value="'+esc(OB.name)+'" placeholder="'+L.s1nameph+'"></div>'+
        '<div><label class="label">'+L.s1link+'</label>'+
          '<input class="field" id="ob_link" dir="ltr" value="'+esc(OB.link)+'" placeholder="'+L.s1linkph+'"></div>'+
      '</div>'+
      '<div class="ob-helper"><span class="hk">&#9673;</span><p>'+L.s1help+'</p></div>'+
      '<button class="btn-primary ob-cta hint-pulse" data-action="obNext">'+L.s1cta+'</button>'+
      '<button class="ob-explore" data-action="obExplore">I\'ll explore a sample first</button>';
  } else if(OB.step===2){
    /* locale-aware discovery — a mix of LOCAL Israeli sources (Eventer · Go-Out
       · Tickchak) and the GLOBAL set (Spotify · Instagram · RA · SoundCloud …). */
    const keys=['instagram','eventer','spotify','goout','residentadvisor','tickchak','soundcloud','tiktok'];
    inner='<div class="ob-eyebrow">'+L.s2eye+'</div><h2>'+L.s2h+'</h2><p class="ob-sub">'+L.s2sub+'</p>'+
      '<div class="ob-market"><span class="mk-flag">&#127470;&#127473;</span><span class="mk-t">'+L.s2market+'</span><span class="mk-sep">·</span><span class="mk-l">'+L.s2langs+'</span></div>'+
      '<div class="ob-scan" id="obScan">'+keys.map(k=>'<span class="ob-src" data-k="'+k+'">'+srcMark(k,48)+'<span class="fd">&#10022;</span></span>').join('')+'</div>'+
      '<div class="ob-scanbar"><i></i></div>'+
      '<div class="ob-caption" id="obCap"><span class="pulsedot"></span> <span id="obCapT">'+L.s2caps[0]+'</span></div>'+
      '<p class="hint" style="text-align:center;margin-top:14px">'+L.s2foot+'</p>';
  } else {
    inner='<div class="ob-eyebrow">'+L.s3eye+'</div><h2>'+L.s3h+'</h2><p class="ob-sub">'+L.s3sub+'</p>'+
      '<div class="ob-foundgrid">'+L.s3rows.map((r,i)=>'<div class="ob-foundrow" style="animation-delay:'+(i*70)+'ms">'+srcMark(r[0],30)+
        '<span class="fr-t">'+r[1]+'</span><span class="fr-c">&#10022; '+L.found+'</span></div>').join('')+'</div>'+
      '<div class="ob-tally">'+L.s3tally+'</div>'+
      '<button class="btn-primary ob-cta hint-pulse" data-action="obToRadar">'+L.s3cta+'</button>'+
      '<button class="ob-explore" data-action="obExplore">'+L.s3explore+'</button>';
  }
  ov.innerHTML='<div class="ob"'+dir+'>'+obDots(OB.step)+inner+'</div>';
  if(OB.step===2){
    // progressive discovery — logos light one by one, captions cycle, then land on step 3
    const srcs=[...ov.querySelectorAll('.ob-src')];
    srcs.forEach((el,i)=>OB.timers.push(setTimeout(()=>el.classList.add('hit'),260+i*300)));
    let ci=0; const capT=$('#obCapT');
    OB.timers.push(setInterval(()=>{ ci=(ci+1)%L.s2caps.length; const t=$('#obCapT'); if(t) t.textContent=L.s2caps[ci]; },900));
    OB.timers.push(setTimeout(()=>{ OB.step=3; renderOnboarding(); },3200));
  }
}
/* kept for compatibility (unused after onboarding replaced the welcome) */
function openWelcome(){ openOnboarding(); }

/* ─────────────────────────  NAV + EVENTS  ───────────────────────── */
function nav(entity,screen){
  if(entity && entity!==S.entity){ S.entity=entity; S.screen=screen||ENTITIES[entity].def; }
  else if(screen){ S.screen=screen; }
  if(S.artist && S.screen!=='radar'){ S.artist.orbit=null; }
  renderShell();
}
win.addEventListener('click',ev=>{
  const en=ev.target.closest('[data-entity]');
  if(en){ closeModal(); nav(en.dataset.entity, ENTITIES[en.dataset.entity].def); closeMenus(false); return; }
  const nv=ev.target.closest('[data-nav]');
  if(nv){ nav(null, nv.dataset.nav); return; }
  const ac=ev.target.closest('[data-action]');
  if(ac){ const fn=ACTIONS[ac.dataset.action]; if(fn){ ev.preventDefault(); fn(ac); } return; }
});
/* restart now lives in the account menu (data-action="doRestart") */

/* ─────────────────────────  BOOT  ───────────────────────── */
renderShell();
openOnboarding();
</script>
</body>
